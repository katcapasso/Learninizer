<div class="container">
    <h1>Learninizer: Text to Image Learning Tool</h1>

    <!-- Upload Section -->
    <div class="upload-section">
        <label for="file-upload">Upload Image or PDF:</label>
        <input type="file" id="file-upload" accept="image/*, .pdf">
    </div>

    <!-- Extracted Text Section -->
    <div id="text-display" class="text-display">
        <h2>Extracted Text</h2>
        <textarea id="extracted-text" placeholder="Extracted text will appear here..." readonly></textarea>
        <button id="highlight-btn">Highlight Text</button>
    </div>

    <!-- Image Creation Section -->
    <div id="image-creation" class="image-creation">
        <h2>Create Image from Text</h2>
        <textarea id="selected-text" placeholder="Highlight or edit text to create image"></textarea>
        <select id="template-select">
            <option value="basic">Basic Template</option>
            <option value="flashcard">Flashcard</option>
        </select>
        <button id="create-image-btn">Create Image</button>
        <canvas id="image-canvas"></canvas>
    </div>

    <!-- Save Section -->
    <div class="save-section">
        <button id="save-image-btn">Save Image</button>
    </div>

    <!-- AI Text Generation Section -->
    <div class="ai-text-generation-section">
        <h2>Ask ChatGPT</h2>
        <textarea id="user-prompt" placeholder="Type your question here..."></textarea>
        <button id="submit-prompt-btn">Submit Prompt</button>
        <div id="chatgpt-response">
            <h3>ChatGPT Response:</h3>
            <p id="response-text"></p>
        </div>
    </div>

    <!-- AI Image Generation Section -->
    <div class="ai-image-section">
        <button id="generate-image-btn">Generate Image with AI</button>
        <div id="image-display">
            <h3>Generated Image:</h3>
            <img id="generated-image" alt="Generated Image" style="max-width: 100%; display: none; border: 1px solid #ccc;" />
        </div>
    </div>
</div>
